
services:
  db:
    image: postgres:16
    container_name: lms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: lms
    ports:
      - "5433:5432"
    volumes:
      - lms_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lms"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: node:20-alpine
    container_name: lms_api
    working_dir: /app/lms-api
    volumes:
      - ./:/app
    environment:
      PORT: 3001
      NODE_ENV: development
      TRUST_PROXY: 1
      CORS_ORIGIN: http://localhost:8080,http://127.0.0.1:8080, http://localhost:8081, http://127.0.0.1:8081
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/lms
      DATABASE_URL_TEST: ""
      JWT_SECRET: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiYWRtaW4iOnRydWUsImlhdCI6MTUxNjIzOTAyMn0.KMUFsIDTnFmyG3nMiGM6H9FNFUROf3wh7SmqJp-QV30
      JWT_EXPIRES_IN: 15m
      ADMIN_BOOTSTRAP_TOKEN: change_me
      PUBLIC_BASE_URL: http://localhost:3001
      COOKIE_SECRET: FVgUiipN9DBALinEuUDRbH/sbdulw61Z5TmQGxqn09c=
      EMAIL_PROVIDER_KEY: ""
      EMAIL_FROM: projectodysseus10@gmail.com
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ODIE_ACCESS_KEYS: ${ODIE_ACCESS_KEYS:-}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-llama-3.3-70b-versatile}
      MAX_TOKENS: ${MAX_TOKENS:-1024}
      TEMPERATURE: ${TEMPERATURE:-0.4}
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm install && npm run migrate && npm run dev"
    ports:
      - "3001:3001"

volumes:
  lms_db_data:
