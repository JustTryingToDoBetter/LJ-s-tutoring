<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ask Odysseus | Project Odysseus</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <!-- CSP enforced via response headers -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/assets/portal.css">
</head>
<body data-page="assistant" data-assistant-scope="student">
  <div class="portal-shell">
    <nav class="portal-nav">
      <div class="portal-nav-inner">
        <div class="brand"><span class="brand-badge">PO</span>Academic OS</div>
        <div class="nav-links">
          <a class="nav-link" data-nav="dashboard" href="/dashboard/">Dashboard</a>
          <a class="nav-link" data-nav="reports" href="/reports/">Reports</a>
          <a class="nav-link" data-nav="assistant" href="/assistant.html">Ask Odysseus</a>
          <a class="nav-link" data-nav="vault" href="/vault.html">Premium Vault</a>
        </div>
      </div>
    </nav>

    <main class="portal-main">
      <section class="page-header">
        <h1 class="page-title">Ask Odysseus</h1>
        <p class="page-subtitle">RAG tutoring assistant grounded in your approved learning vault.</p>
      </section>

      <section class="grid two">
        <article class="panel">
          <div class="row-head">
            <h2 class="panel-title">Threads</h2>
            <button id="newThreadBtn" class="button" type="button">New thread</button>
          </div>
          <div id="threadList" class="list-compact"></div>
        </article>

        <article class="panel">
          <h2 id="chatHeading" class="panel-title">Conversation</h2>
          <div id="chatMessages" class="list-compact" aria-live="polite"></div>
          <form id="chatForm" class="field" style="margin-top: 12px;">
            <label for="chatInput">Question</label>
            <textarea id="chatInput" rows="4" maxlength="4000" required placeholder="Ask a maths concept or revision question"></textarea>
            <button class="button" type="submit">Send</button>
          </form>
        </article>
      </section>
    </main>
  </div>

  <script src="/assets/portal-config.js"></script>
  <script src="/assets/analytics.js"></script>
  <script type="module" src="/assets/assistant-portal.js"></script>
</body>
</html>
