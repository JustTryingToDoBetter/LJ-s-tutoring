services:
  gateway:
    image: nginx:1.27-alpine
    container_name: lms_api_gateway
    depends_on:
      - api
    environment:
      GATEWAY_SHARED_KEY: ${GATEWAY_SHARED_KEY:?Set GATEWAY_SHARED_KEY in .env or shell}
    command: /bin/sh -c "envsubst '$$GATEWAY_SHARED_KEY' < /etc/nginx/templates/nginx.conf.template > /etc/nginx/nginx.conf && exec nginx -g 'daemon off;'"
    volumes:
      - ./ops/gateway/nginx/nginx.conf:/etc/nginx/templates/nginx.conf.template:ro
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    restart: unless-stopped
