<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Reports | Project Odysseus</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Montserrat:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="/assets/portal.css">
</head>
<body data-page="reports">
  <div class="portal-shell">
    <nav class="portal-nav">
      <div class="portal-nav-inner">
        <div class="brand"><span class="brand-badge">PO</span>Project Odysseus</div>
        <div class="nav-links">
          <a class="nav-link" data-nav="dashboard" href="/dashboard/">Dashboard</a>
          <a class="nav-link" data-nav="reports" href="/reports/">Reports</a>
          <a class="nav-link" data-nav="community" href="/dashboard/community/">Community</a>
          <a class="nav-link" data-nav="career" href="/dashboard/career/">Odie Careers</a>
        </div>
      </div>
    </nav>
    <main class="portal-main">
      <section class="page-header">
        <h1 class="page-title">Weekly Reports</h1>
        <p class="page-subtitle">Recently generated learning reports linked to your learner profile.</p>
      </section>
      <section class="panel dashboard-card">
        <div class="row-head">
          <h2 class="panel-title">Generate a report</h2>
          <button id="generateReportBtn" class="button" type="button">Generate this week's report</button>
        </div>
        <p id="generateReportStatus" class="note" aria-live="polite"></p>
      </section>
      <section class="panel dashboard-card">
        <h2 class="panel-title">Your reports</h2>
        <div id="studentReportsList" class="list-compact"></div>
      </section>
    </main>
  </div>
  <script src="/assets/portal-config.js"></script>
  <script src="/assets/student/auth-guard.js"></script>
  <script src="/assets/analytics.js"></script>
  <script type="module" src="/assets/student/reports.js"></script>
</body>
</html>
