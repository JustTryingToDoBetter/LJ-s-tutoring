name: project-odysseus
region: fra
domains:
  - domain: projectodysseus.live
    type: PRIMARY
  - domain: admin.projectodysseus.live
    type: ALIAS
  - domain: tutor.projectodysseus.live
    type: ALIAS
  - domain: student.projectodysseus.live
    type: ALIAS

ingress:
  rules:
    - match:
        authority:
          exact: admin.projectodysseus.live
        path:
          prefix: /admin
      component:
        name: website
    - match:
        authority:
          exact: admin.projectodysseus.live
        path:
          prefix: /
      redirect:
        redirect_code: 302
        scheme: https
        uri: /admin/admin/login.html
    - match:
        authority:
          exact: tutor.projectodysseus.live
        path:
          prefix: /tutor
      component:
        name: website
    - match:
        authority:
          exact: tutor.projectodysseus.live
        path:
          prefix: /
      redirect:
        redirect_code: 302
        scheme: https
        uri: /tutor/tutor/dashboard/
    - match:
        authority:
          exact: student.projectodysseus.live
        path:
          prefix: /dashboard
      component:
        name: website
    - match:
        authority:
          exact: student.projectodysseus.live
        path:
          prefix: /
      redirect:
        redirect_code: 302
        scheme: https
        uri: /dashboard/dashboard/login.html
    - match:
        path:
          prefix: /
      component:
        name: website

static_sites:
  - name: website
    build_command: npm ci && npm run build
    output_dir: dist
    github:
      repo: JustTryingToDoBetter/LJ-s-tutoring
      branch: main
      deploy_on_push: true
    catchall_document: 404.html
    environment_slug: html
    envs:
      - key: PUBLIC_PO_API_BASE
        value: ""
