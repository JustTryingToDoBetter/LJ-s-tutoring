name: project-odysseus
region: fra
domains:
  - domain: projectodysseus.live
    type: PRIMARY
  - domain: www.projectodysseus.live
    type: ALIAS

static_sites:
  - name: website
    build_command: npm ci && npm run build
    output_dir: dist
    github:
      repo: JustTryingToDoBetter/LJ-s-tutoring
      branch: main
      deploy_on_push: true
    routes:
      - path: /
      - path: /admin
      - path: /admin/*
      - path: /tutor
      - path: /tutor/*
      - path: /tutor-dashboard.html
    catchall_document: 404.html
    environment_slug: html
    envs:
      - key: PUBLIC_PO_API_BASE
        value: /api

services:
  - name: api
    github:
      repo: JustTryingToDoBetter/LJ-s-tutoring
      branch: main
      deploy_on_push: true
    source_dir: /lms-api
    build_command: npm ci && npx prisma generate && npm run build
    run_command: npm run prisma:migrate:safe && npm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /api
    envs:
      - key: PORT
        value: "8080"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        type: SECRET
      - key: JWT_SECRET
        type: SECRET
      - key: COOKIE_SECRET
        type: SECRET
      - key: GATEWAY_SHARED_KEY
        type: SECRET
      - key: CORS_ORIGIN
        value: "https://projectodysseus.live,https://www.projectodysseus.live"
      - key: TRUST_PROXY
        value: "1"
      - key: OPENROUTER_API_KEY
        type: SECRET
      - key: ODIE_ACCESS_KEYS
        type: SECRET
      - key: OPENROUTER_MODEL
        value: "google/gemma-2-9b-it:free"
