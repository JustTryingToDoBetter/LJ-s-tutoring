name: project-odysseus
region: fra
domains:
  - domain: projectodysseus.live
    type: PRIMARY
  - domain: www.projectodysseus.live
    type: ALIAS
  - domain: api.projectodysseus.live
    type: ALIAS

static_sites:
  - name: website
    build_command: npm ci && npm run build
    output_dir: dist
    github:
      repo: JustTryingToDoBetter/LJ-s-tutoring
      branch: main
      deploy_on_push: true
    routes:
      - path: /
        headers:
          - name: Strict-Transport-Security
            value: "max-age=31536000; includeSubDomains; preload"
          - name: X-Content-Type-Options
            value: "nosniff"
          - name: Referrer-Policy
            value: "strict-origin-when-cross-origin"
          - name: Permissions-Policy
            value: "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
          - name: X-Frame-Options
            value: "DENY"
          - name: Content-Security-Policy
            value: "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self' https://formspree.io; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:; img-src 'self' data: https://images.unsplash.com https://www.google-analytics.com; connect-src 'self' https://api.projectodysseus.live https://formspree.io https://www.google-analytics.com https://region1.google-analytics.com https://www.googletagmanager.com; upgrade-insecure-requests"
      - path: /admin
        headers:
          - name: X-Robots-Tag
            value: "noindex, nofollow, noarchive, nosnippet"
          - name: Cache-Control
            value: "no-store"
      - path: /admin/*
        headers:
          - name: X-Robots-Tag
            value: "noindex, nofollow, noarchive, nosnippet"
          - name: Cache-Control
            value: "no-store"
      - path: /tutor
        headers:
          - name: X-Robots-Tag
            value: "noindex, nofollow, noarchive, nosnippet"
          - name: Cache-Control
            value: "no-store"
      - path: /tutor/*
        headers:
          - name: X-Robots-Tag
            value: "noindex, nofollow, noarchive, nosnippet"
          - name: Cache-Control
            value: "no-store"
      - path: /tutor-dashboard.html
        headers:
          - name: X-Robots-Tag
            value: "noindex, nofollow, noarchive, nosnippet"
          - name: Cache-Control
            value: "no-store"
    catchall_document: 404.html
    environment_slug: html

services:
  - name: api
    github:
      repo: JustTryingToDoBetter/LJ-s-tutoring
      branch: main
      deploy_on_push: true
    source_dir: /lms-api
    build_command: npm ci && npx prisma generate && npm run build
    run_command: npm run prisma:migrate && npm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    envs:
      - key: PORT
        value: "8080"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        type: SECRET
      - key: JWT_SECRET
        type: SECRET
      - key: COOKIE_SECRET
        type: SECRET
      - key: CORS_ORIGIN
        value: "https://projectodysseus.live,https://www.projectodysseus.live"
      - key: TRUST_PROXY
        value: "1"
      - key: OPENROUTER_API_KEY
        type: SECRET
      - key: ODIE_ACCESS_KEYS
        type: SECRET
      - key: DEFAULT_MODEL
        value: "google/gemma-2-9b-it:free"
