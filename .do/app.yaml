name: project-odysseus
region: fra
domains:
  - domain: projectodysseus.live
    type: PRIMARY
  - domain: admin.projectodysseus.live
    type: ALIAS
  - domain: tutor.projectodysseus.live
    type: ALIAS
  - domain: student.projectodysseus.live
    type: ALIAS

ingress:
  rules:
    - match:
        path:
          prefix: /api
      component:
        name: api
    - match:
        authority:
          exact: admin.projectodysseus.live
        path:
          prefix: /admin
      component:
        name: website
    - match:
        authority:
          exact: admin.projectodysseus.live
        path:
          prefix: /
      redirect:
        redirect_code: 302
        scheme: https
        uri: /admin/login.html
    - match:
        authority:
          exact: tutor.projectodysseus.live
        path:
          prefix: /tutor
      component:
        name: website
    - match:
        authority:
          exact: tutor.projectodysseus.live
        path:
          prefix: /
      redirect:
        redirect_code: 302
        scheme: https
        uri: /tutor/dashboard/
    - match:
        authority:
          exact: student.projectodysseus.live
        path:
          prefix: /dashboard
      component:
        name: website
    - match:
        authority:
          exact: student.projectodysseus.live
        path:
          prefix: /
      redirect:
        redirect_code: 302
        scheme: https
        uri: /dashboard/login.html
    - match:
        path:
          prefix: /
      component:
        name: website

static_sites:
  - name: website
    build_command: npm ci && npm run build
    output_dir: dist
    github:
      repo: JustTryingToDoBetter/LJ-s-tutoring
      branch: main
      deploy_on_push: true
    catchall_document: 404.html
    environment_slug: html
    envs:
      - key: PUBLIC_PO_API_BASE
        value: /api

services:
  - name: api
    github:
      repo: JustTryingToDoBetter/LJ-s-tutoring
      branch: main
      deploy_on_push: true
    source_dir: /lms-api
    build_command: npm ci && npx prisma generate && npm run build
    run_command: npm run prisma:migrate:safe && npm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: PORT
        value: "8080"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        type: SECRET
      - key: JWT_SECRET
        type: SECRET
      - key: COOKIE_SECRET
        type: SECRET
      - key: GATEWAY_SHARED_KEY
        type: SECRET
      - key: CORS_ORIGIN
        value: "https://projectodysseus.live,https://admin.projectodysseus.live,https://tutor.projectodysseus.live,https://student.projectodysseus.live"
      - key: TRUST_PROXY
        value: "1"
      - key: OPENROUTER_API_KEY
        type: SECRET
      - key: ODIE_ACCESS_KEYS
        type: SECRET
      - key: OPENROUTER_MODEL
        value: "google/gemma-2-9b-it:free"
