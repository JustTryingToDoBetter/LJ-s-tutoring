worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format gateway_main '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log gateway_main;

  limit_req_zone $binary_remote_addr zone=api_general:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;

  resolver 127.0.0.11 valid=30s;

  upstream api_upstream {
    zone api_upstream_zone 64k;
    server api:3001 resolve;
    keepalive 32;
  }

  map $request_uri $gateway_auth_required {
    default 1;
    ~^/health$ 0;
    ~^/ready$ 0;
  }

  map $http_x_gateway_key $gateway_key_valid {
    default 0;
    change_me_before_enable 1;
  }

  map "$gateway_auth_required:$gateway_key_valid" $gateway_auth_block {
    default 0;
    "1:0" 1;
  }

  server {
    listen 8080;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection '';

    location = /health {
      proxy_pass http://api_upstream/health;
    }

    location = /ready {
      proxy_pass http://api_upstream/ready;
    }

    location /auth/ {
      limit_req zone=api_auth burst=20 nodelay;
      if ($gateway_auth_block = 1) { return 401; }
      proxy_pass http://api_upstream;
    }

    location / {
      limit_req zone=api_general burst=60 nodelay;
      if ($gateway_auth_block = 1) { return 401; }
      proxy_pass http://api_upstream;
    }
  }
}
