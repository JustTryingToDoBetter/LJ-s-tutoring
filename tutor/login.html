<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tutor Sign in | Project Odysseus</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/assets/portal.css">
</head>
<body>
  <main class="center-shell">
    <section class="panel auth-card">
      <h1 class="page-title">Tutor Sign in</h1>
      <p class="page-subtitle">Sign in to your tutoring portal.</p>

      <!-- Google OAuth button -->
      <div id="googleSignIn" style="margin-bottom:1rem">
        <a id="googleBtn" href="#" class="button button--outline" style="display:flex;align-items:center;gap:0.5rem;justify-content:center;text-decoration:none">
          <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#4285F4" d="M44.5 20H24v8.5h11.8C34.1 33.3 29.6 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l6-6C34.4 6.5 29.5 4.5 24 4.5 13.3 4.5 4.5 13.3 4.5 24S13.3 43.5 24 43.5c10.9 0 20-8.2 20-19.5 0-1.3-.1-2.7-.5-4z"/>
          </svg>
          Sign in with Google
        </a>
      </div>

      <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem">
        <hr style="flex:1;border:none;border-top:1px solid rgba(255,255,255,0.1)">
        <span style="color:var(--muted,#7a8fa6);font-size:0.8rem">or</span>
        <hr style="flex:1;border:none;border-top:1px solid rgba(255,255,255,0.1)">
      </div>

      <!-- Email + password form -->
      <form id="loginForm" class="stack-form">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button class="button" type="submit">Sign in</button>
        <p id="loginFeedback" class="note" aria-live="polite"></p>
      </form>
    </section>
  </main>
  <script src="/assets/portal-config.js"></script>
  <script type="module" src="/assets/tutor/tutor-login.js"></script>
</body>
</html>
