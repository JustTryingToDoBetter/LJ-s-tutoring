<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tutor Dashboard | Project Odysseus</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/assets/portal.css">
</head>
<body data-page="dashboard">
  <div class="portal-shell">
    <nav class="portal-nav">
      <div class="portal-nav-inner">
        <div class="brand"><span class="brand-badge">PO</span>Tutor Portal</div>
        <div class="nav-links">
          <a class="nav-link" data-nav="dashboard" href="/tutor/dashboard/">Dashboard</a>
          <a class="nav-link" href="/tutor/reports/">Reports</a>
          <a class="nav-link" href="/tutor/risk/">Risk</a>
          <a class="nav-link" href="/tutor/sessions.html">Sessions</a>
          <a class="nav-link" href="/tutor/assignments.html">Assignments</a>
        </div>
      </div>
    </nav>
    <main class="portal-main">
      <section class="page-header">
        <h1 class="page-title">Tutor Operations</h1>
        <p class="page-subtitle">Today’s sessions, quick tools, and the students who need attention.</p>
      </section>
      <section class="grid two">
        <article class="panel dashboard-card">
          <h2 class="panel-title">Today sessions</h2>
          <div id="tutorTodaySessions" class="list-compact"></div>
        </article>
        <article class="panel dashboard-card">
          <h2 class="panel-title">Quick tools</h2>
          <div id="tutorQuickTools" class="link-stack compact"></div>
        </article>
      </section>
      <section class="panel dashboard-card">
        <h2 class="panel-title">Students needing attention</h2>
        <div id="tutorAttentionList" class="list-compact"></div>
      </section>
    </main>
  </div>
  <script src="/assets/portal-config.js"></script>
  <script src="/assets/analytics.js"></script>
  <script type="module" src="/assets/tutor/dashboard.js"></script>
</body>
</html>
