name: Deploy API

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
      rollback:
        description: Run rollback command instead of deploy
        required: false
        default: 'false'
      sync_app_spec:
        description: Apply .do/app.yaml before deployment (defaults to false for code-only deploys)
        required: false
        default: 'false'

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci && npm ci --prefix lms-api

      - name: Release gates
        run: |
          npm run lint
          cd lms-api && npm run build

  deploy:
    needs: preflight
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy or rollback
        env:
          API_DEPLOY_COMMAND: ${{ secrets.API_DEPLOY_COMMAND || vars.API_DEPLOY_COMMAND }}
          ROLLBACK_COMMAND: ${{ secrets.API_ROLLBACK_COMMAND || vars.API_ROLLBACK_COMMAND }}
          GATEWAY_SHARED_KEY: ${{ secrets.GATEWAY_SHARED_KEY || vars.GATEWAY_SHARED_KEY }}
          DIGITAL_ACCESS_TOKEN: ${{ secrets.DIGITAL_ACCESS_TOKEN || vars.DIGITAL_ACCESS_TOKEN || secrets.DIGITALOCEAN_ACCESS_TOKEN || vars.DIGITALOCEAN_ACCESS_TOKEN }}
          DIGITAL_APP_ID: ${{ secrets.DIGITAL_APP_ID || vars.DIGITAL_APP_ID || secrets.DIGITALOCEAN_APP_ID || vars.DIGITALOCEAN_APP_ID }}
          DIGITAL_APP_NAME: ${{ secrets.DIGITAL_APP_NAME || vars.DIGITAL_APP_NAME || secrets.DIGITALOCEAN_APP_NAME || vars.DIGITALOCEAN_APP_NAME || 'projectodysseus' }}
          DOCTL_VERSION: ${{ vars.DOCTL_VERSION || '1.154.0' }}
          SYNC_APP_SPEC: ${{ github.event.inputs.sync_app_spec || vars.SYNC_APP_SPEC || 'false' }}
          DO_DEPLOY_MAX_CHECKS: ${{ vars.DO_DEPLOY_MAX_CHECKS || '120' }}
          DO_DEPLOY_POLL_SECONDS: ${{ vars.DO_DEPLOY_POLL_SECONDS || '10' }}
        run: |
          if [ "${{ github.event.inputs.rollback }}" = "true" ]; then
            if [ -z "$ROLLBACK_COMMAND" ]; then
              echo "Missing API_ROLLBACK_COMMAND (set it as a secret or variable)"
              exit 1
            fi
            eval "$ROLLBACK_COMMAND"
          else
            if [ -z "$API_DEPLOY_COMMAND" ]; then
              echo "Missing API_DEPLOY_COMMAND (set it as a secret or variable)"
              exit 1
            fi

            if [ "$API_DEPLOY_COMMAND" = "production" ]; then
              if [ -z "$DIGITAL_ACCESS_TOKEN" ]; then
                echo "API_DEPLOY_COMMAND=production requires DIGITAL_ACCESS_TOKEN/DIGITALOCEAN_ACCESS_TOKEN"
                exit 1
              fi

              curl -fsSL "https://github.com/digitalocean/doctl/releases/download/v${DOCTL_VERSION}/doctl-${DOCTL_VERSION}-linux-amd64.tar.gz" -o doctl.tgz
              tar -xzf doctl.tgz doctl
              sudo mv doctl /usr/local/bin/doctl

              doctl auth init -t "$DIGITAL_ACCESS_TOKEN"

              apps_list="$(doctl apps list --no-header 2>/dev/null || true)"

              normalize_name() {
                echo "$1" | tr '[:upper:]' '[:lower:]' | tr -cd '[:alnum:]'
              }

              resolve_app_id_by_name() {
                local app_name="$1"
                local exact_match
                exact_match="$(echo "$apps_list" | awk -v name="$app_name" '$2 == name { print $1; exit }')"
                if [ -n "$exact_match" ]; then
                  echo "$exact_match"
                  return
                fi

                local target
                target="$(normalize_name "$app_name")"
                if [ -z "$target" ]; then
                  return
                fi

                echo "$apps_list" | awk -v target="$target" '
                  function normalize(s) {
                    s = tolower(s)
                    gsub(/[^a-z0-9]/, "", s)
                    return s
                  }
                  normalize($2) == target { print $1; exit }
                '
              }

              if [ -n "$DIGITAL_APP_ID" ]; then
                if ! doctl apps get "$DIGITAL_APP_ID" >/dev/null 2>&1; then
                  echo "Configured DIGITAL_APP_ID is not accessible in this token context: $DIGITAL_APP_ID"
                  DIGITAL_APP_ID=""
                fi
              fi

              if [ -z "$DIGITAL_APP_ID" ]; then
                DIGITAL_APP_ID="$(resolve_app_id_by_name "$DIGITAL_APP_NAME")"
                if [ -n "$DIGITAL_APP_ID" ]; then
                  echo "Resolved app ID from DIGITAL_APP_NAME=$DIGITAL_APP_NAME"
                fi
              fi

              if [ -z "$DIGITAL_APP_ID" ]; then
                visible_apps_count="$(echo "$apps_list" | sed '/^[[:space:]]*$/d' | wc -l | tr -d ' ')"
                if [ "$visible_apps_count" = "1" ]; then
                  DIGITAL_APP_ID="$(echo "$apps_list" | awk 'NR == 1 { print $1 }')"
                  echo "Resolved app ID from single visible app in token context"
                fi
              fi

              if [ -z "$DIGITAL_APP_ID" ]; then
                echo "Unable to resolve DigitalOcean app ID. Set DIGITAL_APP_ID/DIGITALOCEAN_APP_ID or DIGITAL_APP_NAME."
                echo "Apps visible to this token:"
                if [ -z "$apps_list" ]; then
                  echo "- none"
                else
                  echo "$apps_list" | awk '{print "- " $2 " (" $1 ")"}'
                fi
                exit 1
              fi

              if [ "$SYNC_APP_SPEC" = "true" ]; then
                if [ -f ".do/app.yaml" ]; then
                  echo "SYNC_APP_SPEC=true: updating app spec from .do/app.yaml"
                  doctl apps update "$DIGITAL_APP_ID" --spec .do/app.yaml >/dev/null
                else
                  echo "SYNC_APP_SPEC=true but .do/app.yaml was not found"
                  exit 1
                fi
              else
                echo "Skipping app spec sync (code-only deployment). Set sync_app_spec=true to apply .do/app.yaml."
              fi

              app_json="$(doctl apps get "$DIGITAL_APP_ID" --output json 2>/dev/null || echo '[]')"

              missing_envs=""
              for required_key in DATABASE_URL JWT_SECRET COOKIE_SECRET; do
                if ! echo "$app_json" | grep -Eq "\"key\"[[:space:]]*:[[:space:]]*\"$required_key\""; then
                  missing_envs="${missing_envs}${missing_envs:+, }$required_key"
                fi
              done

              if [ -n "$missing_envs" ]; then
                echo "App spec is missing required API env keys: $missing_envs"
                echo "Add these env keys in DigitalOcean App Platform for the API component, then rerun deployment."
                exit 1
              fi

              if ! echo "$app_json" | grep -Eq '"path"[[:space:]]*:[[:space:]]*"/api("|/)'; then
                echo "App spec does not currently expose the API on /api."
                echo "Rerun with sync_app_spec=true to apply .do/app.yaml route mapping."
                exit 1
              fi

              deployment_id="$(doctl apps create-deployment "$DIGITAL_APP_ID" --format ID --no-header | awk 'NR == 1 { print $1 }')"
              if [ -z "$deployment_id" ]; then
                echo "Failed to create deployment for app ID: $DIGITAL_APP_ID"
                exit 1
              fi
              echo "Created deployment ID: $deployment_id"

              print_deployment_diagnostics() {
                echo "Deployment diagnostics (deployment=$deployment_id):"
                doctl apps get-deployment "$DIGITAL_APP_ID" "$deployment_id" || true
                echo "Recent deploy logs:"
                doctl apps logs "$DIGITAL_APP_ID" --type deploy --deployment "$deployment_id" --tail 200 --no-prefix || true
                echo "Recent run logs:"
                doctl apps logs "$DIGITAL_APP_ID" --type run --deployment "$deployment_id" --tail 200 --no-prefix || true
              }

              max_checks="$DO_DEPLOY_MAX_CHECKS"
              sleep_seconds="$DO_DEPLOY_POLL_SECONDS"
              for attempt in $(seq 1 "$max_checks"); do
                phase="$(doctl apps get-deployment "$DIGITAL_APP_ID" "$deployment_id" --format Phase --no-header 2>/dev/null | tr -d '\r' | xargs)"
                progress="$(doctl apps get-deployment "$DIGITAL_APP_ID" "$deployment_id" --format Progress --no-header 2>/dev/null | tr -d '\r' | xargs)"
                echo "Deployment status: phase=${phase:-unknown} progress=${progress:-unknown} (attempt $attempt/$max_checks)"

                case "$phase" in
                  ACTIVE|RUNNING)
                    echo "Deployment reached active state."
                    break
                    ;;
                  ERROR|FAILED|CANCELED|SUPERSEDED)
                    echo "Deployment entered terminal state: $phase"
                    print_deployment_diagnostics
                    exit 1
                    ;;
                esac

                if [ "$attempt" -eq "$max_checks" ]; then
                  echo "Deployment did not reach ACTIVE/RUNNING before timeout."
                  print_deployment_diagnostics
                  exit 1
                fi

                sleep "$sleep_seconds"
              done

              exit 0
            fi

            if [ "$API_DEPLOY_COMMAND" = "staging" ]; then
              echo "API_DEPLOY_COMMAND=staging is not mapped. Set API_DEPLOY_COMMAND to an executable command for staging."
              exit 1
            fi

            if echo "$API_DEPLOY_COMMAND" | grep -q "docker-compose.gateway.yml"; then
              if [ -z "$GATEWAY_SHARED_KEY" ]; then
                echo "Missing GATEWAY_SHARED_KEY (set it as a secret or variable)"
                exit 1
              fi
            fi
            eval "$API_DEPLOY_COMMAND"
          fi

      - name: Post-deploy health check
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL || vars.HEALTHCHECK_URL || 'https://projectodysseus.live/api' }}
          SYNC_APP_SPEC: ${{ github.event.inputs.sync_app_spec || vars.SYNC_APP_SPEC || 'false' }}
        run: |
          max_checks=20
          sleep_seconds=10
          last_http_code="000"
          for attempt in $(seq 1 "$max_checks"); do
            response_file="$(mktemp)"
            last_http_code="$(curl -sS -o "$response_file" -w "%{http_code}" "${HEALTHCHECK_URL%/}/ready" || echo 000)"
            if [ "$last_http_code" = "200" ]; then
              echo "Health check passed on attempt $attempt/$max_checks"
              rm -f "$response_file"
              exit 0
            fi
            echo "Health check not ready yet (attempt $attempt/$max_checks, http=$last_http_code)"
            rm -f "$response_file"
            if [ "$attempt" -lt "$max_checks" ]; then
              sleep "$sleep_seconds"
            fi
          done

          if [ "$last_http_code" = "404" ] && [ "$SYNC_APP_SPEC" != "true" ]; then
            echo "Health endpoint returned 404 and app spec sync was skipped. Rerun with sync_app_spec=true to apply .do/app.yaml route mapping for /api."
          fi

          echo "Health check failed after $max_checks attempts: ${HEALTHCHECK_URL%/}/ready (last_http=$last_http_code)"
          exit 1
