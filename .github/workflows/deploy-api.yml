name: Deploy API

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
      rollback:
        description: Run rollback command instead of deploy
        required: false
        default: 'false'

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci && npm ci --prefix lms-api

      - name: Release gates
        run: |
          npm run lint
          cd lms-api && npm run build

  deploy:
    needs: preflight
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy or rollback
        env:
          API_DEPLOY_COMMAND: ${{ secrets.API_DEPLOY_COMMAND || vars.API_DEPLOY_COMMAND }}
          ROLLBACK_COMMAND: ${{ secrets.API_ROLLBACK_COMMAND || vars.API_ROLLBACK_COMMAND }}
          GATEWAY_SHARED_KEY: ${{ secrets.GATEWAY_SHARED_KEY || vars.GATEWAY_SHARED_KEY }}
        run: |
          if [ "${{ github.event.inputs.rollback }}" = "true" ]; then
            if [ -z "$ROLLBACK_COMMAND" ]; then
              echo "Missing API_ROLLBACK_COMMAND (set it as a secret or variable)"
              exit 1
            fi
            eval "$ROLLBACK_COMMAND"
          else
            if [ -z "$API_DEPLOY_COMMAND" ]; then
              echo "Missing API_DEPLOY_COMMAND (set it as a secret or variable)"
              exit 1
            fi
            if [ "$API_DEPLOY_COMMAND" = "production" ] || [ "$API_DEPLOY_COMMAND" = "staging" ]; then
              echo "API_DEPLOY_COMMAND must be an executable shell command, not '$API_DEPLOY_COMMAND'"
              exit 1
            fi
            if echo "$API_DEPLOY_COMMAND" | grep -q "docker-compose.gateway.yml"; then
              if [ -z "$GATEWAY_SHARED_KEY" ]; then
                echo "Missing GATEWAY_SHARED_KEY (set it as a secret or variable)"
                exit 1
              fi
            fi
            eval "$API_DEPLOY_COMMAND"
          fi

      - name: Post-deploy health check
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL || vars.HEALTHCHECK_URL }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "HEALTHCHECK_URL not set (set it as a secret or variable)"
            exit 1
          fi
          curl -fsS "${HEALTHCHECK_URL%/}/ready"
