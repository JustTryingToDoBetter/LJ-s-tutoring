name: DR Restore Verify

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DR_VERIFY_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run restore verification
        run: npm run restore:verify --prefix lms-api
