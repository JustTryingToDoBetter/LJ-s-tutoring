name: DB Maintenance Check

on:
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * 1'

jobs:
  maintenance:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DB_MAINTENANCE_STRICT: 'false'
      DB_MAINTENANCE_SLOW_QUERY_WARN_MS: '250'
      DB_MAINTENANCE_SLOW_QUERY_CRITICAL_MS: '750'
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run DB maintenance checks
        run: npm run db:maintenance:check --prefix lms-api
